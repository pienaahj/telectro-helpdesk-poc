# compose.production.yaml
#
# Production deployment override.
#
# Current production boundary:
#
# - Telectro owns public DNS, firewall/reverse proxy, HTTPS termination,
#   certificate private keys, CLM/renewal, reverse proxy reload, and monitoring.
# - This application stack does not run Traefik as the public production edge.
# - This application stack does not publish ports 80/443.
# - This application stack exposes only the agreed internal HTTP target for
#   Telectro's reverse proxy.
# - Backend, database, Redis, workers, scheduler, and websocket remain internal.
#
# Expected command shape:
#
# docker compose -f compose.yaml -f compose.production.yaml config
# docker compose -f compose.yaml -f compose.production.yaml up -d
#
# Internal reverse proxy target:
#
# By default this binds the ERPNext/Frappe nginx frontend to localhost only:
#
#   127.0.0.1:8080 -> frontend:8080
#
# If Telectro's reverse proxy runs on another host and must reach this VM over
# the network, set APP_INTERNAL_HTTP_BIND explicitly, for example:
#
#   APP_INTERNAL_HTTP_BIND=0.0.0.0
#   APP_INTERNAL_HTTP_PORT=8080
#
# Do not expose this internal HTTP target publicly without Telectro firewall /
# reverse proxy approval.
#
# Production durable-data bind-mount root:
#
# The production stack deliberately uses host bind mounts for durable data that
# should be explicit on the ERP VM. This aligns with Telectro's infrastructure
# preference because the production data paths are easier to inspect, easier to
# back up deliberately, and easier to expand/move if disk capacity changes.
#
# Expected host layout:
#
#   ${PRODUCTION_DATA_ROOT}/mariadb      -> MariaDB data
#   ${PRODUCTION_DATA_ROOT}/sites        -> Frappe sites, config, files
#   ${PRODUCTION_DATA_ROOT}/logs         -> Frappe/bench logs
#   ${PRODUCTION_DATA_ROOT}/assets       -> generated/public assets
#   app/env are supplied by the production runtime image; production Compose
#   must not mount named apps/env volumes over image-provided runtime contents.
#   Local development restores apps/env named volumes through compose.override.yaml.
#   ${PRODUCTION_DATA_ROOT}/redis-queue  -> Redis queue persistence
#
# Recommended production value:
#
#   PRODUCTION_DATA_ROOT=/opt/telectro/erpnext/data
#
# This file is still not production-ready until real production values are
# confirmed for:
#
# - database/admin passwords
# - site creation secrets
# - production site-name usage
# - pinned production image tags
# - final server-local secrets handling
# - Telectro reverse proxy internal target host/port
# - backup mount and restore proof
# - SMTP/IMAP smoke proof

services:
  frontend:

    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/sites:/var/www/html/sites
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/assets:/var/www/html/assets
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/assets:/assets
    image: ${ERPNEXT_NGINX_IMAGE:?Set ERPNEXT_NGINX_IMAGE}
    command:
      - nginx-entrypoint.sh
    ports:
      - "${APP_INTERNAL_HTTP_BIND:-127.0.0.1}:${APP_INTERNAL_HTTP_PORT:-8080}:8080"
    environment:
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:?Set SITE_NAME}
      FRAPPE_PY: backend
      FRAPPE_PY_PORT: 8000
      FRAPPE_SOCKETIO: websocket
      SOCKETIO_PORT: 9000
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      WEB_PORT: 8080


  backend:

    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/sites:/home/frappe/frappe-bench/sites
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/assets:/home/frappe/frappe-bench/sites/assets
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/logs:/home/frappe/frappe-bench/logs
      - ./import:/import:ro
    environment:
      # Production should use SITE_NAME rather than hard-coded "frontend".
      TELECTRO_DEBUG: "0"

      # Override local/test DB root password values from the base compose.
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H 'X-Frappe-Site-Name: ${SITE_NAME:?Set SITE_NAME}' http://localhost:8000/api/method/ping >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  # Production should not expose websocket directly to the host.
  # The frontend/nginx service should reach websocket internally through Docker networking.
  websocket:

    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/sites:/home/frappe/frappe-bench/sites
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/logs:/home/frappe/frappe-bench/logs
    expose:
      - "9000"

  # Local Docker mail server is not part of production.
  # Production email should use a real SMTP account configured in Frappe.
  mail:
    profiles:
      - local-only

  # bench-runner is local repair/tooling only and should not run in production.
  bench-runner:
    profiles:
      - local-only

  create-site:

    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/sites:/home/frappe/frappe-bench/sites
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
      SITE_NAME: ${SITE_NAME:?Set SITE_NAME}
      FRAPPE_ADMIN_PASSWORD: ${FRAPPE_ADMIN_PASSWORD:?Set FRAPPE_ADMIN_PASSWORD}
      DB_ROOT_USERNAME: ${DB_ROOT_USERNAME:-root}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}

    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=$$FRAPPE_ADMIN_PASSWORD --db-root-username=$$DB_ROOT_USERNAME --db-root-password=$$MARIADB_ROOT_PASSWORD --install-app erpnext --set-default $$SITE_NAME;

  db:

    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/mariadb:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost --password=$$MARIADB_ROOT_PASSWORD",
        ]
      interval: 1s
      retries: 20

  configurator:
    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/sites:/home/frappe/frappe-bench/sites
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/logs:/home/frappe/frappe-bench/logs

  queue-long:
    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/sites:/home/frappe/frappe-bench/sites
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/assets:/home/frappe/frappe-bench/sites/assets
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/logs:/home/frappe/frappe-bench/logs

  queue-short:
    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/sites:/home/frappe/frappe-bench/sites
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/assets:/home/frappe/frappe-bench/sites/assets
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/logs:/home/frappe/frappe-bench/logs

  scheduler:
    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/sites:/home/frappe/frappe-bench/sites
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/assets:/home/frappe/frappe-bench/sites/assets
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/logs:/home/frappe/frappe-bench/logs

  redis-queue:
    volumes:
      - ${PRODUCTION_DATA_ROOT:?Set PRODUCTION_DATA_ROOT}/redis-queue:/data
