# compose.production.yaml
#
# Production deployment skeleton.
#
# This file is not intended to be used blindly yet.
# It documents the intended production shape:
#
# - Traefik handles public HTTP/HTTPS.
# - Browser traffic enters through ports 80/443 only.
# - Traefik routes ERPNext/Frappe browser traffic to the frontend nginx service.
# - Backend, database, Redis, workers, scheduler, and websocket remain internal.
# - Certificate material is mounted from ./certs and must not be committed to Git.
#
# Expected command shape later:
#
# docker compose -f compose.yaml -f compose.production.yaml up -d
#
# IMPORTANT:
# This production override currently prevents known local-only helper services
# such as mail and bench-runner from running in the normal production merge by
# assigning them to a local-only profile.
#
# This file is still not production-ready. The rendered production config still
# needs production-safe handling for:
#
# - database/admin passwords
# - site creation secrets
# - production site-name usage in create-site and healthchecks
# - pinned production image tags
# - final server-local secrets handling
#
# Do not use this blindly for a real deployment until those items are resolved
# and validated against the real Telectro production inputs.

services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # Public entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # HTTP -> HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # File provider for supplied certificate configuration.
      # Exact config file will be added once certificate layout is confirmed.
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"

      # Keep dashboard disabled for production by default.
      # If enabled for diagnostics, protect it and do not expose it publicly.
      - "--api.dashboard=false"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./certs:/certs:ro"
      - "./traefik/dynamic:/etc/traefik/dynamic:ro"
    networks:
      - frappe_network

  frontend:
    # In production, Traefik should route to frontend/nginx, not directly to backend.
    # The direct host port 8080 from compose.yaml is local-only and should not be
    # exposed in production once the compose structure is finalised.

    image: ${ERPNEXT_NGINX_IMAGE:?Set ERPNEXT_NGINX_IMAGE}
    
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.erpnext.rule=Host(`${PRODUCTION_HOSTNAME:?Set PRODUCTION_HOSTNAME}`)"
      - "traefik.http.routers.erpnext.entrypoints=websecure"
      - "traefik.http.routers.erpnext.tls=true"
      - "traefik.http.routers.erpnext.service=erpnext-frontend"

      - "traefik.http.services.erpnext-frontend.loadbalancer.server.port=8080"

    environment:
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:?Set SITE_NAME}
      WEB_PORT: "8080"

  backend:
    environment:
      # Production should use SITE_NAME rather than hard-coded "frontend".
      TELECTRO_DEBUG: "0"

      # Override local/test DB root password values from the base compose.
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H 'X-Frappe-Site-Name: ${SITE_NAME:?Set SITE_NAME}' http://localhost:8000/api/method/ping >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  # Production should not expose websocket directly to the host.
  # The frontend/nginx service should reach websocket internally through Docker networking.
  # Local Docker mail server is not part of production.
  # Production email should use a real SMTP account configured in Frappe.
  mail:
    profiles:
      - local-only

  # bench-runner is local repair/tooling only and should not run in production.
  bench-runner:
    profiles:
      - local-only

  create-site:
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
      SITE_NAME: ${SITE_NAME:?Set SITE_NAME}
      FRAPPE_ADMIN_PASSWORD: ${FRAPPE_ADMIN_PASSWORD:?Set FRAPPE_ADMIN_PASSWORD}
      DB_ROOT_USERNAME: ${DB_ROOT_USERNAME:-root}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}

    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=$$FRAPPE_ADMIN_PASSWORD --db-root-username=$$DB_ROOT_USERNAME --db-root-password=$$MARIADB_ROOT_PASSWORD --install-app erpnext --set-default $$SITE_NAME;

  db:
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost --password=$$MARIADB_ROOT_PASSWORD",
        ]
      interval: 1s
      retries: 20